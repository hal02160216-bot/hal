<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<title>Drone Map Japan</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
body { margin:0; font-family:sans-serif; }
#map { height:100vh; }

/* ボタン */
#infoBtn, #locateBtn {
    position:absolute;
    z-index:1000;
    background:rgba(255,255,255,0.8);
    backdrop-filter:blur(10px);
    border-radius:10px;
    border:1px solid rgba(0,0,0,0.1);
    cursor:pointer;
}
#infoBtn {
    bottom:20px; right:20px;
    width:48px; height:48px;
    border-radius:50%;
    display:flex; align-items:center; justify-content:center;
}
#locateBtn {
    top:12px; right:12px;
    padding:8px 12px;
}

/* モーダル */
#modal {
    position:fixed;
    width:100%; height:100%;
    display:none;
    justify-content:center;
    align-items:center;
    background:rgba(0,0,0,0.3);
}
#modalContent {
    background:rgba(255,255,255,0.8);
    padding:20px;
    border-radius:16px;
    width:85%;
    max-width:400px;
}
</style>
</head>

<body>

<div id="map"></div>
<div id="locateBtn">現在地</div>
<div id="infoBtn">ⓘ</div>

<div id="modal">
  <div id="modalContent">
    <h3>免責・出典</h3>
    <p>本マップは参考情報です。最終判断は公式情報をご確認ください。</p>
    <button onclick="closeModal()">閉じる</button>
  </div>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://unpkg.com/@turf/turf/turf.min.js"></script>

<script>

// 地図
var map = L.map('map').setView([35.68,139.76], 6);

// 背景地図
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

// ===== DID =====
var didLayer;

// 全国DID読み込み
fetch('A16-20_00_DID.json')
.then(res => res.json())
.then(data => {

    didLayer = data;

    L.geoJSON(data, {
        style: {
            color: "#ff4d4d",
            weight: 1,
            fillOpacity: 0.05
        }
    }).addTo(map);
});

// ===== 空港 =====
var airportLayer = [
    {name:"関西国際空港",lat:34.4347,lng:135.2441,radius:9000},
    {name:"伊丹空港",lat:34.7855,lng:135.4382,radius:5000},
    {name:"羽田空港",lat:35.5494,lng:139.7798,radius:8000},
    {name:"成田空港",lat:35.7719,lng:140.3929,radius:9000}
];

airportLayer.forEach(a=>{
    L.circle([a.lat,a.lng],{
        radius:a.radius,
        color:"orange",
        fillColor:"orange",
        fillOpacity:0.08
    }).addTo(map).bindPopup(a.name);
});

// ===== 現在地 =====
document.getElementById("locateBtn").onclick = ()=>{
    map.locate({setView:true,maxZoom:15});
};

map.on('locationfound', e=>{
    L.marker(e.latlng).addTo(map).bindPopup("現在地");
});

// ===== 判定 =====
var lastMarker;

map.on('click', function(e){

    if(!didLayer) return;

    if(lastMarker) map.removeLayer(lastMarker);

    var point = turf.point([e.latlng.lng, e.latlng.lat]);

    var inDID = false;
    didLayer.features.forEach(f=>{
        if(turf.booleanPointInPolygon(point,f)) inDID = true;
    });

    var inAirport = false;
    airportLayer.forEach(a=>{
        var dist = map.distance(e.latlng,[a.lat,a.lng]);
        if(dist < a.radius) inAirport = true;
    });

    var text = "";
    var color = "green";

    if(inDID && inAirport){
        text = "飛行NG（DID＋空港）";
        color = "purple";
    } else if(inDID){
        text = "飛行NG（人口集中地区）";
        color = "red";
    } else if(inAirport){
        text = "飛行NG（空港周辺）";
        color = "orange";
    } else {
        text = "飛行OK（規制外）";
        color = "green";
    }

    lastMarker = L.circleMarker(e.latlng,{
        radius:8,
        color:color,
        fillColor:color,
        fillOpacity:0.9
    }).addTo(map)
      .bindPopup(text)
      .openPopup();
});

// ===== モーダル =====
document.getElementById("infoBtn").onclick = ()=>{
    document.getElementById("modal").style.display="flex";
};

function closeModal(){
    document.getElementById("modal").style.display="none";
}

</script>

</body>
</html>
