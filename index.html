<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<title>大阪ドローンマップ</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
#map { height: 100vh; }

/* 現在地ボタン */
.locate-btn {
    position: absolute;
    top: 10px;
    right: 10px;
    z-index: 1000;
    background: white;
    padding: 8px 12px;
    border-radius: 5px;
    cursor: pointer;
}
</style>
</head>
<body>

<div id="map"></div>
<div class="locate-btn" onclick="goLocation()">現在地</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://unpkg.com/@turf/turf/turf.min.js"></script>

<script>

// 地図
var map = L.map('map').setView([34.6937, 135.5023], 11);

// タイル
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

// DIDデータ
var didLayer;

// ★ クリックマーカー管理
var lastMarker;

// データ読み込み
fetch('oosaka.geojson')
.then(res => res.json())
.then(data => {

    didLayer = data;

    // ★ 枠線だけ表示
    L.geoJSON(data, {
        style: {
            color: "red",
            weight: 1,
            fillOpacity: 0
        }
    }).addTo(map);
});

// 現在地
function goLocation(){
    map.locate({ setView: true, maxZoom: 16 });
}

map.on('locationfound', function(e) {
    L.marker(e.latlng).addTo(map)
        .bindPopup("現在地")
        .openPopup();

    L.circle(e.latlng, {
        radius: e.accuracy
    }).addTo(map);
});

map.on('locationerror', function(e) {
    alert("位置情報が取得できません");
});

// ★ クリック判定（完成版）
map.on('click', function(e) {

    if (!didLayer) {
        alert("データ読み込み中");
        return;
    }

    // 前のマーカー削除
    if (lastMarker) {
        map.removeLayer(lastMarker);
    }

    var point = turf.point([e.latlng.lng, e.latlng.lat]);

    var inside = false;

    didLayer.features.forEach(function(feature) {
        if (turf.booleanPointInPolygon(point, feature)) {
            inside = true;
        }
    });

    // 色とメッセージ
    var color = inside ? "red" : "green";
    var message = inside 
        ? "飛行NG（人口集中地区）" 
        : "飛行OK（DID外）";

    // マーカー
    lastMarker = L.circleMarker(e.latlng, {
        radius: 8,
        color: color,
        fillColor: color,
        fillOpacity: 0.8
    }).addTo(map);

    // ポップアップ
    lastMarker.bindPopup(message).openPopup();
});

</script>

</body>
</html>
