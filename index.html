<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<title>大阪ドローンマップ</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
<style>
#map { height: 100vh; }
</style>
</head>
<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script>

var map = L.map('map').setView([34.6937, 135.5023], 11);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

// ★これに戻す
fetch('oosaka.geojson')
.then(res => res.json())
.then(data => {
    L.geoJSON(data, {
        style: {
            color: "red",
            fillColor: "red",
            fillOpacity: 0.4
        }
    }).addTo(map);
});

</script>

</body>
</html>
