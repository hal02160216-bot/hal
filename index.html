<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<title>Drone Map Japan</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
body { margin:0; font-family:sans-serif; }
#map { height:100vh; }

/* UI */
#infoBtn, #locateBtn {
    position:absolute;
    z-index:1000;
    background:rgba(255,255,255,0.9);
    backdrop-filter:blur(10px);
    border-radius:10px;
    border:1px solid rgba(0,0,0,0.1);
    cursor:pointer;
}
#infoBtn {
    bottom:20px; right:20px;
    width:50px; height:50px;
    border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    font-size:18px;
}
#locateBtn {
    top:12px; right:12px;
    padding:8px 12px;
}

/* 検索 */
#searchBox {
    position:absolute;
    top:12px;
    left:12px;
    z-index:1000;
    padding:10px;
    border-radius:12px;
    border:1px solid rgba(0,0,0,0.2);
    background:rgba(255,255,255,0.9);
    backdrop-filter:blur(10px);
    width:230px;
}

/* ===== モーダル完全対策 ===== */
#modal {
    position:fixed;
    top:0; left:0;
    width:100%; height:100%;

    display:flex;
    justify-content:center;
    align-items:center;

    background:rgba(0,0,0,0.4);
    backdrop-filter:blur(6px);

    z-index:99999;

    opacity:0;
    pointer-events:none;
    transition:0.2s;
}

#modal.show {
    opacity:1;
    pointer-events:auto;
}

#modalContent {
    background:rgba(255,255,255,0.95);
    padding:20px;
    border-radius:16px;
    width:85%;
    max-width:420px;
    box-shadow:0 10px 30px rgba(0,0,0,0.3);
}
</style>
</head>

<body>

<div id="map"></div>
<input id="searchBox" placeholder="住所検索（Enter）">
<div id="locateBtn">現在地</div>
<div id="infoBtn">ⓘ</div>

<div id="modal">
  <div id="modalContent">
    <h3>免責・出典</h3>
    <p>
      本マップは参考情報です。<br>
      最終判断は航空法・DIPS等の公式情報をご確認ください。
    </p>
    <p>
      【出典】<br>
      ・国土地理院<br>
      ・国土交通省 航空局<br>
      ・国勢調査DIDデータ
    </p>
    <button onclick="closeModal()">閉じる</button>
  </div>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://unpkg.com/@turf/turf/turf.min.js"></script>

<script>

// ===== 地図 =====
var map = L.map('map').setView([35.68,139.76], 5);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

// ===== DID =====
var didLayer;
fetch('A16-20_00_DID.json')
.then(res => res.json())
.then(data => {
    didLayer = data;
    L.geoJSON(data, {
        style:{color:"#ff4d4d",weight:1,fillOpacity:0.03}
    }).addTo(map);
});

// ===== 空港 =====
var airportLayer = [
    {name:"羽田空港",lat:35.5494,lng:139.7798,radius:8000},
    {name:"成田空港",lat:35.7719,lng:140.3929,radius:9000},
    {name:"関西国際空港",lat:34.4347,lng:135.2441,radius:9000},
    {name:"伊丹空港",lat:34.7855,lng:135.4382,radius:5000}
];

airportLayer.forEach(a=>{
    L.circle([a.lat,a.lng],{
        radius:a.radius,
        color:"orange",
        fillOpacity:0.08
    }).addTo(map).bindPopup(a.name);
});

// ===== 判定関数 =====
function checkFlight(lat, lon){
    let point = turf.point([lon, lat]);

    let inDID = false;
    if(didLayer){
        didLayer.features.forEach(f=>{
            if(turf.booleanPointInPolygon(point,f)) inDID = true;
        });
    }

    let inAirport = false;
    airportLayer.forEach(a=>{
        if(map.distance([lat,lon],[a.lat,a.lng]) < a.radius){
            inAirport = true;
        }
    });

    if(inDID && inAirport) return {text:"飛行NG（DID＋空港）",color:"purple"};
    if(inDID) return {text:"飛行NG（人口集中地区）",color:"red"};
    if(inAirport) return {text:"飛行NG（空港周辺）",color:"orange"};
    return {text:"飛行OK（規制外）",color:"green"};
}

// ===== クリック判定 =====
let lastMarker;
map.on('click', e=>{
    if(!didLayer) return;

    if(lastMarker) map.removeLayer(lastMarker);

    let r = checkFlight(e.latlng.lat, e.latlng.lng);

    lastMarker = L.circleMarker(e.latlng,{
        radius:8,color:r.color,fillColor:r.color,fillOpacity:0.9
    }).addTo(map).bindPopup(r.text).openPopup();
});

// ===== 現在地 =====
let currentMarker;
document.getElementById("locateBtn").onclick = ()=>{
    map.locate({setView:true,maxZoom:15});
};
map.on('locationfound', e=>{
    if(currentMarker) map.removeLayer(currentMarker);
    currentMarker = L.marker(e.latlng).addTo(map).bindPopup("現在地").openPopup();
});

// ===== 検索（制限付き） =====
let searchMarker;
let lastSearchTime = 0;

document.getElementById("searchBox").addEventListener("keydown", e=>{
    if(e.key !== "Enter") return;

    let now = Date.now();
    if(now - lastSearchTime < 1500){
        alert("少し待ってください");
        return;
    }
    lastSearchTime = now;

    let q = e.target.value;
    if(!q) return;

    fetch("https://nominatim.openstreetmap.org/search?format=json&q="+encodeURIComponent(q))
    .then(r=>r.json())
    .then(d=>{
        if(!d.length) return alert("見つかりません");

        let lat = parseFloat(d[0].lat);
        let lon = parseFloat(d[0].lon);

        map.setView([lat,lon],15);

        if(searchMarker) map.removeLayer(searchMarker);

        let r = checkFlight(lat,lon);

        searchMarker = L.circleMarker([lat,lon],{
            radius:8,color:r.color,fillColor:r.color,fillOpacity:0.9
        }).addTo(map).bindPopup(r.text).openPopup();
    });
});

// ===== モーダル（完全安定） =====
const modal = document.getElementById("modal");

document.getElementById("infoBtn").onclick = ()=>{
    modal.classList.add("show");
};

function closeModal(){
    modal.classList.remove("show");
}

// 背景クリックで閉じる
modal.onclick = (e)=>{
    if(e.target === modal){
        closeModal();
    }
};

</script>

</body>
</html>
